name: e2e

# Playwright E2E smoke tests for Admin panel.
# Requires a live database (Supabase) — spins up NO local PostgreSQL.
# Set DATABASE_URL and JWT_SECRET as GitHub repo secrets.
#
# Local equivalent:
#   ADMIN_E2E_EMAIL=admin@medusa-test.com ADMIN_E2E_PASSWORD=supersecret \
#   PLAYWRIGHT_SKIP_WEBSERVER=1 PLAYWRIGHT_BASE_URL=http://localhost:7000/app/ \
#   pnpm --filter=@my-store/admin test:e2e

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/admin/src/**'
      - 'apps/admin/e2e/**'
      - 'apps/admin/playwright.config.ts'
      - 'apps/server/src/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/admin/src/**'
      - 'apps/admin/e2e/**'
      - 'apps/admin/playwright.config.ts'
      - 'apps/server/src/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check E2E prerequisites
        id: e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${JWT_SECRET:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 DATABASE_URL / JWT_SECRET，跳过 Admin E2E。请在仓库 Settings → Secrets 中配置后再跑完整测试。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.e2e.outputs.skip != 'true'
        working-directory: apps/admin
        run: pnpm exec playwright install chromium --with-deps

      - name: Build admin UI (outputs to apps/server/public/app)
        if: steps.e2e.outputs.skip != 'true'
        run: pnpm build:admin

      - name: Seed admin user & run E2E
        if: steps.e2e.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SEED_ADMIN_EMAIL: admin@medusa-test.com
          SEED_ADMIN_PASSWORD: supersecret
          PORT: 7000
          NODE_ENV: test
          SERVE_ADMIN: "1"
        run: |
          set -euo pipefail
          cd apps/server

          echo "Seeding admin user..."
          npx tsx scripts/seed-admin.ts

          echo "Starting server..."
          npx tsx entry.node.ts &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          READY=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7000/api/health > /tmp/health.json; then
              echo "Server ready"
              cat /tmp/health.json | head -c 500
              echo ""
              READY=1
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

          if [ "$READY" != "1" ]; then
            echo "::error::无法连接 E2E 服务（/api/health 超时）。请检查 DATABASE_URL 是否可达、JWT_SECRET 是否已设置。"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          cd ../admin
          PLAYWRIGHT_SKIP_WEBSERVER=1 \
          PLAYWRIGHT_BASE_URL=http://localhost:7000/app/ \
          PLAYWRIGHT_API_URL=http://localhost:7000 \
          ADMIN_E2E_EMAIL=admin@medusa-test.com \
          ADMIN_E2E_PASSWORD=supersecret \
          CI=true \
          pnpm test:e2e

          PLAYWRIGHT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $PLAYWRIGHT_EXIT

      - name: Upload Playwright report
        if: failure() && steps.e2e.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin/test-results/
          retention-days: 7
